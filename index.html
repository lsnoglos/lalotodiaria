<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Loto Diaria Nicaragua · Analizador Inteligente</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <h1>Analizador Loto Diaria</h1>
      <div class="controls">
        <button id="refreshBtn" class="btn primary">Actualizar</button>
        <button id="generatePlayBtn" class="btn accent">Generar Jugada</button>
      </div>
      <p id="generatedPlay" class="generated-play">Recomendado para las 12:00pm: --, --, --, --, --.</p>
      <small id="status" class="status">Inicializando…</small>
    </header>

    <main class="layout">
      <section class="card span-2">
        <h2>Tablero 00–99</h2>
        <div id="numberGrid" class="number-grid"></div>
      </section>

      <section class="card">
        <h2>Top 5 del día</h2>
        <ol id="topRecommendations" class="list"></ol>
      </section>

      <section class="card">
        <h2>Algoritmos visuales</h2>
        <div id="algorithmPanels" class="algorithm-panels"></div>
      </section>

      <section class="card span-2">
        <details>
          <summary id="hourPanelTitle">Panel por hora del mes de ...</summary>
          <div id="hourAccordion" class="accordion"></div>
        </details>
      </section>

      <section class="card span-2">
        <details>
          <summary id="historyTitle">Historial del mes de ...</summary>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Fecha</th>
                  <th>Hora</th>
                  <th>Número</th>
                </tr>
              </thead>
              <tbody id="historyBody"></tbody>
            </table>
          </div>
        </details>
      </section>

    </main>

    <template id="accordionTemplate">
      <details open>
        <summary></summary>
        <div class="accordion-content"></div>
      </details>
    </template>

    <script src="app.js"></script>
  </body>
</html>
